services:
  primary:
    build:
      context: ../..
      dockerfile: docker/postgres-ext.Dockerfile
    container_name: psch-test-primary
    ports:
      - "55432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_ch"
      - "-c"
      - "pg_stat_ch.enabled=on"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "hot_standby=on"
    volumes:
      - primary-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  primary-pgdata:
