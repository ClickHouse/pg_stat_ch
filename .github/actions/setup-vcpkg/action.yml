name: Setup vcpkg
description: Install vcpkg, set VCPKG_ROOT, and configure binary caching

runs:
  using: composite
  steps:
    - name: Export GitHub Actions cache variables
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Install vcpkg
      shell: bash
      run: |
        if [ ! -d "$HOME/vcpkg" ]; then
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
        fi
        echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
        echo "$HOME/vcpkg" >> "$GITHUB_PATH"

        # Use GHA binary caching if available, otherwise fall back to local files cache
        if [ -n "$ACTIONS_CACHE_URL" ]; then
          echo "vcpkg: using GHA binary cache"
          echo "VCPKG_BINARY_SOURCES=clear;x-gha,readwrite" >> "$GITHUB_ENV"
        else
          echo "vcpkg: ACTIONS_CACHE_URL not set, using local files cache"
          mkdir -p "$HOME/.cache/vcpkg/archives"
          echo "VCPKG_BINARY_SOURCES=clear;files,$HOME/.cache/vcpkg/archives,readwrite" >> "$GITHUB_ENV"
        fi
