name: Setup vcpkg
description: Install vcpkg, set VCPKG_ROOT, and configure binary caching

inputs:
  triplet:
    description: "vcpkg triplet (used for cache key)"
    required: false
    default: "x64-linux-pic"

runs:
  using: composite
  steps:
    - name: Install vcpkg
      shell: bash
      run: |
        if [ ! -d "$HOME/vcpkg" ]; then
          # Full clone required — Arrow depends on Boost, which needs vcpkg git history
          git clone https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
        fi
        echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
        echo "$HOME/vcpkg" >> "$GITHUB_PATH"

        # Use a stable directory for vcpkg binary cache (runner.temp can be wiped)
        mkdir -p "$HOME/.cache/vcpkg-archives"
        echo "VCPKG_DEFAULT_BINARY_CACHE=$HOME/.cache/vcpkg-archives" >> "$GITHUB_ENV"

    - name: Cache vcpkg binary archives
      uses: actions/cache@v4
      with:
        path: ~/.cache/vcpkg-archives
        key: vcpkg-${{ inputs.triplet }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'triplets/*.cmake') }}
        restore-keys: |
          vcpkg-${{ inputs.triplet }}-
