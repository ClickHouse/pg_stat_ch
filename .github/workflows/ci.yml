name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CI: true  # Enables -Werror

jobs:
  build-and-test:
    name: Build & Test (PG ${{ matrix.pg_version }})
    runs-on: depot-ubuntu-24.04-16
    strategy:
      fail-fast: false
      matrix:
        pg_version: [16, 17, 18]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add PostgreSQL APT repository
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg
          curl https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/apt.postgresql.org.gpg >/dev/null
          echo "deb [arch=amd64] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update

      - name: Install PostgreSQL ${{ matrix.pg_version }}
        run: |
          sudo apt-get install -y \
            postgresql-${{ matrix.pg_version }} \
            postgresql-server-dev-${{ matrix.pg_version }}

      - name: Install build dependencies
        run: sudo apt-get install -y cmake ninja-build g++ libssl-dev pkg-config curl zip unzip tar

      - uses: ./.github/actions/setup-vcpkg

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: pg${{ matrix.pg_version }}
          max-size: 500M

      - name: Configure
        run: |
          cmake --preset default \
            -DPG_CONFIG=/usr/lib/postgresql/${{ matrix.pg_version }}/bin/pg_config \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --parallel

      - name: Install extension
        run: sudo cmake --install build

      - name: Run regression tests
        run: |
          /usr/lib/postgresql/${{ matrix.pg_version }}/lib/pgxs/src/test/regress/pg_regress \
            --bindir=/usr/lib/postgresql/${{ matrix.pg_version }}/bin \
            --inputdir=test/regression \
            --outputdir=test/regression/results \
            --temp-instance=test/regression/tmp_check \
            --temp-config=test/regression/pg_stat_ch.conf \
            basic version guc stats utility buffers cmd_type client_info error_capture

      - name: Run isolation tests
        run: |
          mkdir -p specs/results
          /usr/lib/postgresql/${{ matrix.pg_version }}/lib/pgxs/src/test/isolation/pg_isolation_regress \
            --bindir=/usr/lib/postgresql/${{ matrix.pg_version }}/bin \
            --inputdir=specs \
            --outputdir=specs/results \
            --temp-instance=specs/tmp_check \
            --temp-config=test/regression/pg_stat_ch.conf \
            --load-extension=pg_stat_ch \
            ring_buffer_concurrent ring_buffer_boundary overflow_race

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-pg${{ matrix.pg_version }}
          path: |
            test/regression/results/
            test/regression/tmp_check/log/
            specs/results/
            specs/tmp_check/log/

  unit-tests:
    name: C++ Unit Tests
    runs-on: depot-ubuntu-24.04-16
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add PostgreSQL APT repository
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg
          curl https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/apt.postgresql.org.gpg >/dev/null
          echo "deb [arch=amd64] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update

      - name: Install PostgreSQL 18 headers
        run: sudo apt-get install -y postgresql-server-dev-18

      - name: Install build dependencies
        run: sudo apt-get install -y cmake ninja-build g++ libssl-dev pkg-config curl zip unzip tar

      - uses: ./.github/actions/setup-vcpkg

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: unit-tests
          max-size: 500M

      - name: Configure
        run: |
          cmake -B build_unit -G Ninja \
            -DPG_CONFIG=/usr/lib/postgresql/18/bin/pg_config \
            -DPSCH_BUILD_UNIT_TESTS=ON \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=x64-linux-pic \
            -DVCPKG_OVERLAY_TRIPLETS=${{ github.workspace }}/triplets \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build_unit --target hostname_test arrow_batch_test --parallel

      - name: Run unit tests
        run: ctest --test-dir build_unit --output-on-failure

  bench-otel:
    name: OTel Throughput Benchmark
    runs-on: depot-ubuntu-24.04-16
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # BuildKit is needed for the type=gha cache backend used below.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # perf record inside the container needs paranoid <= 1.
      - name: Allow perf profiling
        run: sudo sysctl kernel.perf_event_paranoid=1

      # Build the benchmark image with GHA layer cache.
      # The Dockerfile is structured so that the slow vcpkg dep-compilation
      # layer is cached separately from the fast pg_stat_ch source layer, so
      # only changed .cc files are recompiled on subsequent runs.
      - name: Build benchmark image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/perf.Dockerfile
          tags: psch-perf-pg:latest
          load: true
          cache-from: type=gha,scope=perf-image
          cache-to: type=gha,scope=perf-image,mode=max

      - name: Run OTel benchmark
        run: |
          mkdir -p docker/perf-results
          # --no-build: image was pre-built above and tagged psch-perf-pg:latest
          # (matching the image: field in docker-compose.perf.yml).
          # || true: bench exits 141 (SIGPIPE) when Docker closes the log stream
          # after the container exits normally; we validate success via log grep below.
          docker compose -f docker/docker-compose.perf.yml up \
            --no-build \
            --abort-on-container-exit \
            --exit-code-from pg-perf \
            2>&1 | tee /tmp/bench-output.log || true

          # Verify the benchmark ran to completion (perf report was produced).
          # A drain timeout is a known throughput signal, not a benchmark failure;
          # full drain correctness is validated by the regression/isolation tests.
          grep -q "Top 15 Hotspots" /tmp/bench-output.log \
            || { echo "ERROR: benchmark did not complete (no perf report produced)"; exit 1; }
          if grep -q "Drain timeout" /tmp/bench-output.log; then
            echo "::warning::Queue did not fully drain within the timeout — the bgworker could not keep up with benchmark load. This is a throughput signal, not a benchmark failure."
          fi

          # perf data files are written by root inside the container; make them
          # readable by the runner before the upload and summary steps.
          sudo chmod -R a+r docker/perf-results/

      - name: Publish results to job summary
        if: always()
        run: |
          strip_prefix() { sed 's/^[^|]*|[[:space:]]*//' "$@"; }
          strip_ansi()   { sed 's/\x1b\[[0-9;]*m//g' "$@"; }
          {
            echo "## OTel Throughput Benchmark"
            echo ""
            if grep -q "Drain timeout" /tmp/bench-output.log 2>/dev/null; then
              echo "> [!WARNING]"
              echo "> Queue did not fully drain — the bgworker could not keep up with benchmark load. This is a throughput signal, not a benchmark failure."
              echo ""
            fi
            echo "### Summary"
            echo '```'
            grep "psch-perf-pg" /tmp/bench-output.log \
              | strip_prefix \
              | strip_ansi \
              | awk '/--- Summary ---/{p=1; next} /--- End of Summary ---/{exit} p' \
              || echo "(summary not available)"
            echo '```'
            if grep -qE '^\s+[0-9]+\.[0-9]+%' docker/perf-results/bench-otel-perf.txt 2>/dev/null; then
              echo ""
              echo "### Top Hotspots"
              echo '```'
              grep -E '^\s+[0-9]+\.[0-9]+%' docker/perf-results/bench-otel-perf.txt | head -15 || echo "(Not available)"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload perf results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: docker/perf-results/
          if-no-files-found: warn

      - name: Cleanup containers
        if: always()
        run: docker compose -f docker/docker-compose.perf.yml down --volumes 2>/dev/null || true

  lint:
    name: Code Style
    runs-on: depot-ubuntu-24.04-16
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          find src include -name '*.cc' -o -name '*.h' | xargs clang-format --dry-run --Werror
