name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CI: true  # Enables -Werror

jobs:
  build-and-test:
    name: Build & Test (PG ${{ matrix.pg_version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        pg_version: [16, 17, 18]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Add PostgreSQL APT repository
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg
          curl https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/apt.postgresql.org.gpg >/dev/null
          echo "deb [arch=amd64] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update

      - name: Install PostgreSQL ${{ matrix.pg_version }}
        run: |
          sudo apt-get install -y \
            postgresql-${{ matrix.pg_version }} \
            postgresql-server-dev-${{ matrix.pg_version }}

      - name: Install build dependencies
        run: sudo apt-get install -y cmake ninja-build g++

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: pg${{ matrix.pg_version }}
          max-size: 500M

      - name: Configure
        run: |
          cmake --preset default \
            -DPG_CONFIG=/usr/lib/postgresql/${{ matrix.pg_version }}/bin/pg_config \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --parallel

      - name: Install extension
        run: sudo cmake --install build

      - name: Run regression tests
        run: |
          /usr/lib/postgresql/${{ matrix.pg_version }}/lib/pgxs/src/test/regress/pg_regress \
            --bindir=/usr/lib/postgresql/${{ matrix.pg_version }}/bin \
            --inputdir=test/regression \
            --outputdir=test/regression/results \
            --temp-instance=test/regression/tmp_check \
            --temp-config=test/regression/pg_stat_ch.conf \
            basic version guc stats utility buffers cmd_type client_info error_capture

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regress-results-pg${{ matrix.pg_version }}
          path: |
            test/regression/results/
            test/regression/tmp_check/log/

  integration-tests:
    name: ClickHouse Integration
    runs-on: ubuntu-24.04
    needs: build-and-test

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.3
        ports:
          - 19000:9000
          - 18123:8123
        options: >-
          --health-cmd "clickhouse-client -q 'SELECT 1'"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Add PostgreSQL APT repository
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg
          curl https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/apt.postgresql.org.gpg >/dev/null
          echo "deb [arch=amd64] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update

      - name: Install PostgreSQL 18
        run: |
          sudo apt-get install -y \
            postgresql-18 \
            postgresql-server-dev-18

      - name: Install build dependencies
        run: sudo apt-get install -y cmake ninja-build g++ curl

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: integration
          max-size: 500M

      - name: Build and install
        run: |
          cmake --preset default \
            -DPG_CONFIG=/usr/lib/postgresql/18/bin/pg_config \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build --parallel
          sudo cmake --install build

      - name: Initialize ClickHouse schema
        run: |
          curl -sf 'http://localhost:18123/' --data-binary @docker/init/00-schema.sql

      - name: Test ClickHouse export
        run: |
          export PATH="/usr/lib/postgresql/18/bin:$PATH"
          PGDATA=$(mktemp -d)
          initdb -D "$PGDATA" --no-locale

          cat >> "$PGDATA/postgresql.conf" << 'EOF'
          shared_preload_libraries = 'pg_stat_ch'
          pg_stat_ch.enabled = on
          pg_stat_ch.clickhouse_host = 'localhost'
          pg_stat_ch.clickhouse_port = 19000
          pg_stat_ch.clickhouse_database = 'pg_stat_ch'
          pg_stat_ch.flush_interval_ms = 100
          pg_stat_ch.batch_max = 100
          EOF

          pg_ctl -D "$PGDATA" -l "$PGDATA/logfile" start
          createdb testdb
          psql testdb -c "CREATE EXTENSION pg_stat_ch"
          psql testdb -c "SELECT 1; SELECT 2; SELECT 3;"
          psql testdb -c "SELECT pg_stat_ch_flush()"
          sleep 2

          CH_COUNT=$(curl -sf 'http://localhost:18123/' --data "SELECT count() FROM pg_stat_ch.events_raw")
          echo "Events exported: $CH_COUNT"
          pg_ctl -D "$PGDATA" stop

          [ "$CH_COUNT" -ge 1 ] || exit 1

  lint:
    name: Code Style
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          find src include -name '*.cc' -o -name '*.h' | xargs clang-format --dry-run --Werror
