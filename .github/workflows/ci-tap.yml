name: TAP Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CI: true
  PG_VERSION: REL_18_STABLE

jobs:
  tap-tests:
    name: TAP Tests (PG 18)
    runs-on: [self-hosted, Linux, X64, amd-large]

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.3
        ports:
          - 19000:9000
          - 18123:8123
        options: >-
          --health-cmd "clickhouse-client -q 'SELECT 1'"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install PostgreSQL build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libreadline-dev \
            zlib1g-dev \
            flex \
            bison \
            libxml2-dev \
            libxslt1-dev \
            libssl-dev \
            libicu-dev \
            pkg-config \
            libipc-run-perl \
            cmake \
            ninja-build

      - name: Cache PostgreSQL build
        id: cache-pg
        uses: actions/cache@v4
        with:
          path: ~/pg-tap
          key: pg-tap-${{ env.PG_VERSION }}-v1

      - name: Build PostgreSQL with TAP support
        if: steps.cache-pg.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch=${{ env.PG_VERSION }} https://github.com/postgres/postgres.git ~/postgres-src
          cd ~/postgres-src
          ./configure --enable-tap-tests --prefix=$HOME/pg-tap
          make -j$(nproc)
          make install

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: tap-tests
          max-size: 500M

      - name: Build extension
        run: |
          export PATH="$HOME/pg-tap/bin:$PATH"
          cmake --preset default \
            -DPG_CONFIG=$HOME/pg-tap/bin/pg_config \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build --parallel
          cmake --install build

      - name: Wait for ClickHouse HTTP interface
        run: |
          for i in {1..30}; do
            if curl -sf 'http://localhost:18123/' --data 'SELECT 1' >/dev/null 2>&1; then
              echo "ClickHouse HTTP ready"
              exit 0
            fi
            echo "Waiting for ClickHouse HTTP... ($i/30)"
            sleep 1
          done
          echo "ClickHouse HTTP not ready after 30s"
          exit 1

      - name: Initialize ClickHouse schema
        run: |
          curl -sf 'http://localhost:18123/' --data-binary @docker/init/00-schema.sql

      - name: Run TAP tests
        run: |
          export PATH="$HOME/pg-tap/bin:$PATH"
          export PG_REGRESS="$HOME/pg-tap/lib/postgresql/pgxs/src/test/regress/pg_regress"
          export PERL_LIB="$HOME/pg-tap/lib/postgresql/pgxs/src/test/perl"
          prove -v --timer -I "$PERL_LIB" -I t t/*.pl

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tap-test-logs
          path: t/tmp_check/
